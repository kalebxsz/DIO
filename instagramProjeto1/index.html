<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">Instagram</div>

      
      <img class="avatar" src="./img/kaleb.jpeg" alt="Sua foto de perfil">

      <a class="btn-primary" href="#">Continue como Kaleb Gabriel</a>
      <a class="link-remover" href="#">Remover conta</a>
    </div>

    <div class="card card-bottom">
      Não é Kaleb Gabriel?
      <a href="#">Alternar contas</a>
      <span class="ou"> ou </span>
      <a href="#">Inscreva-se</a>
    </div>

    <div class="apps">
      <p class="apps-title">Baixe o aplicativo</p>
      <div class="store-row">
        <a class="store-btn" href="#">
          <span>
            Baixe por aqui<br>
            <strong>App Store</strong>
          </span>
        </a>
        <a class="store-btn" href="#">
          <span>
            Baixe por aqui<br>
            <strong>Google Play</strong>
          </span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
